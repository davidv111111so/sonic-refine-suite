steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.gpu'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/mastering-backend-gpu:latest'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/mastering-backend-gpu:latest'
timeout: '3600s'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: '100'
